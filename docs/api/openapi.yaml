          - browser_assistance
          - voice
      - name: state
        in: query
        schema:
          type: string
      - name: agent_id
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      responses:
        '200':
          description: Operator sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  operator_sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/OperatorSession'
  /missions:
    get:
      tags:
      - missions
      summary: List runtime missions visible to the mobile app
      parameters:
      - name: node_id
        in: query
        schema:
          type: string
      - name: agent_id
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      responses:
        '200':
          description: Runtime missions
          content:
            application/json:
              schema:
                type: object
                required:
                - missions
                properties:
                  missions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Mission'
  /missions/{mission_id}:
    get:
      tags:
      - missions
      summary: Get a runtime mission
      parameters:
      - name: mission_id
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      responses:
        '200':
          description: Runtime mission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mission'
        '404':
          $ref: '#/components/responses/NotFound'
  /runtime/context:
    post:
      tags:
      - runtime
      summary: Register runtime agent, mission, and session context
      description: Loopback-only runtime contract for Hermes to identify active work
        without coupling the gateway to Hermes internals.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeContextRequest'
      responses:
        '200':
          description: Runtime context projection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeContextResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
  /runtime/notifications:
    post:
      tags:
      - runtime
      summary: Create runtime-originated mobile notification
      description: Loopback-only notification request. Does not dispatch APNs or FCM.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileNotifyRequest'
      responses:
        '202':
          description: Notification queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
  /runtime/approvals:
    post:
      tags:
      - runtime
      summary: Create runtime-originated approval request
      description: Creates a pending approval and exposes result polling for the runtime.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HermesApprovalRequestedRequest'
      responses:
        '201':
          description: Approval created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
  /runtime/approvals/{approval_id}/result:
    get:
      tags:
      - runtime
      summary: Poll runtime approval result
      security: []
      parameters:
      - $ref: '#/components/parameters/ApprovalId'
      responses:
        '200':
          description: Approval result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeApprovalResult'
        '404':
          $ref: '#/components/responses/NotFound'
  /runtime/approvals/{approval_id}/cancel:
    post:
      tags:
      - runtime
      summary: Cancel runtime approval request
      security: []
      parameters:
      - $ref: '#/components/parameters/ApprovalId'
      responses:
        '200':
          description: Cancelled approval result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeApprovalResult'
  /runtime/tua/requests:
    post:
      tags:
      - runtime
      summary: Create runtime-originated TUA request
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssistanceRequest'
      responses:
        '201':
          description: TUA request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistanceRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /runtime/tua/requests/{request_id}/result:
    get:
      tags:
      - runtime
      summary: Poll runtime TUA result
      security: []
      parameters:
      - name: request_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: TUA result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeTuaResult'
  /runtime/browser-assistance/sessions:
    post:
      tags:
      - runtime
      summary: Create runtime-originated browser assistance session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBrowserAssistanceSessionRequest'
      responses:
        '201':
          description: Browser assistance session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserAssistanceSession'
  /runtime/browser-assistance/sessions/{session_id}/result:
    get:
      tags:
      - runtime
      summary: Poll runtime browser assistance result
      security: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Browser assistance result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeBrowserAssistanceResult'
  /runtime/voice/sessions:
    post:
      tags:
      - runtime
      summary: Create runtime-originated text-backed voice session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeCreateVoiceSessionRequest'
      responses:
        '201':
          description: Voice session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceSession'
  /runtime/voice/sessions/{session_id}/result:
    get:
      tags:
      - runtime
      summary: Poll runtime voice result
      security: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Voice result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeVoiceResult'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ApprovalId:
      name: approval_id
      in: path
      required: true
      schema:
        type: string
    ApprovalPolicyId:
      name: approval_policy_id
      in: path
      required: true
      schema:
        type: string
    AgentId:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
    AssistanceSessionId:
      name: assistance_session_id
      in: path
      required: true
      schema:
        type: string
    ConversationId:
      name: conversation_id
      in: path
      required: true
      schema:
        type: string
    DeviceId:
      name: device_id
      in: path
      required: true
      schema:
        type: string
    HMCPDeviceIdHeader:
      name: X-HMCP-Device-Id
      in: header
      required: true
      schema:
        type: string
    HMCPTimestampHeader:
      name: X-HMCP-Timestamp
      in: header
      required: true
      schema:
        type: string
      description: Unix timestamp in seconds; gateway tolerance is 300 seconds.
    HMCPNonceHeader:
      name: X-HMCP-Nonce
      in: header
      required: true
      schema:
        type: string
      description: Unique nonce per device request.
    HMCPSignatureHeader:
      name: X-HMCP-Signature
      in: header
      required: true
      schema:
        type: string
      description: Ed25519 signature over the HMCP canonical request string.
    NodeId:
      name: node_id
      in: path
      required: true
      schema:
        type: string
    PairingId:
      name: pairing_id
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
    TeamId:
      name: team_id
      in: path
      required: true
      schema:
        type: string
    VoiceSessionId:
      name: voice_session_id
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Not authorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Resource conflict or already resolved
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unprocessable:
      description: Request rejected by policy or validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required:
      - error
      - request_id
      properties:
        error:
          type: string
        message:
          type: string
        request_id:
          type: string
    GatewayHealth:
      type: object
      required:
      - node_id
      - status
      - gateway_version
      - checked_at
      properties:
        node_id:
          type: string
        status:
          enum:
          - healthy
          - degraded
          - unhealthy
        gateway_version:
          type: string
        hermes_version:
          type: string
        checked_at:
          type: string
          format: date-time
        services:
          type: object
          additionalProperties:
            enum:
            - healthy
            - degraded
            - unhealthy
            - unavailable
    CreatePairingSessionRequest:
      type: object
      required:
      - display_name
      properties:
        display_name:
          type: string
        requested_permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        clearance_channel:
          $ref: '#/components/schemas/ClearanceChannel'
          default: local_terminal
          description: Operator-pinned principal channel class for the pairing session.
        ttl_seconds:
          type: integer
          minimum: -1
          maximum: 3600
          description: Test/development override for pairing token expiry.
    PairingSession:
      type: object
      required:
      - pairing_id
      - challenge
      - status
      - node_id
      - node_fingerprint
      - clearance_channel
      - expires_at
      properties:
        pairing_id:
          type: string
        pairing_token:
          type: string
          description: One-time token returned only when creating a pairing session.
        challenge:
          type: string
        status:
          enum:
          - pending
          - completed
          - expired
          - cancelled
        node_id:
          type: string
        node_fingerprint:
          type: string
        clearance_channel:
          $ref: '#/components/schemas/ClearanceChannel'
        expires_at:
          type: string
          format: date-time
    CompletePairingRequest:
      type: object
      required:
      - pairing_id
      - challenge_response
      - device_public_key
      - device
      properties:
        pairing_id:
          type: string
        challenge_response:
          type: string
        device_public_key:
          type: string
        device:
          $ref: '#/components/schemas/DeviceRegistration'
    CompletePairingResponse:
      type: object
      required:
      - node
      - device
      - tokens
      properties:
        node:
          $ref: '#/components/schemas/Node'
        device:
          $ref: '#/components/schemas/Device'
        tokens:
          $ref: '#/components/schemas/AuthTokenSet'
    RefreshTokenRequest:
      type: object
      required:
      - refresh_token
      - signed_nonce
      properties:
        refresh_token:
          type: string
        signed_nonce:
          type: string
    AuthTokenSet:
      type: object
      required:
      - access_token
      - refresh_token
      - expires_at
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
    Permission:
      enum:
      - read_state
      - chat
      - approve
      - intervene
      - manage_devices
      - voice
      - tui
      - browser_assist
    DeviceRegistration:
      type: object
      required:
      - device_name
      - platform
      - app_instance_id
      properties:
        device_name:
          type: string
        platform:
          enum:
          - ios
          - android
          - local_terminal
        app_instance_id:
          type: string
        app_version:
          type: string
        push_token:
          type: string
        clearance_channel:
          $ref: '#/components/schemas/ClearanceChannel'
          description: Legacy compatibility echo only. If supplied and it conflicts
            with the pairing session class, completion is rejected.
    Device:
      type: object
      required:
      - device_id
      - device_name
      - platform
      - status
      - permissions
      - clearance_channel
      - registered_at
      properties:
        device_id:
          type: string
        device_name:
          type: string
        platform:
          enum:
          - ios
          - android
          - local_terminal
        status:
          enum:
          - active
          - revoked
          - lost
          - rotating
          - disabled
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        clearance_channel:
          $ref: '#/components/schemas/ClearanceChannel'
          description: Enrolled principal channel class pinned by the pairing session.
        registered_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
    RotateDeviceKeyRequest:
      type: object
      required:
      - old_key_signature
      - new_device_public_key
      properties:
        old_key_signature:
          type: string
        new_device_public_key:
          type: string
    NodeRegistration:
      type: object
      required:
      - display_name
      - gateway_base_url
      - node_fingerprint
      - gateway_version
      properties:
        node_id:
          type: string
        display_name:
          type: string
        environment:
          $ref: '#/components/schemas/Environment'
        gateway_base_url:
          type: string
        node_fingerprint:
          type: string
        gateway_version:
          type: string
        hermes_version:
          type: string
        tags:
          type: array
          items:
            type: string
    Inventory:
      type: object
      required:
      - nodes
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/Node'
    Node:
      type: object
      required:
      - node_id
      - display_name
      - environment
      - health
      - capabilities
      properties:
        node_id:
