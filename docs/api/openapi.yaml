openapi: 3.1.0
info:
  title: Agentic Control Tower Gateway API
  version: 0.1.0
  description: 'Implementation-ready API contract for Agentic Control Tower. The API
    is self-hosted first and intended to run beside agentic backends. Hermes remains
    adapter #1, and WebSocket event streaming is documented as an HTTP upgrade endpoint
    with event schemas.

    '
servers:
- url: https://{gateway_host}/v1
  description: Direct gateway over Tailscale, trusted local network, HTTPS, or future
    relay
  variables:
    gateway_host:
      default: 100.64.0.10:8787
security:
- bearerAuth: []
tags:
- name: health
- name: pairing
- name: auth
- name: devices
- name: inventory
- name: teams
- name: chat
- name: approvals
- name: approval-policies
- name: notifications
- name: events
- name: audit
- name: interventions
- name: hermes-tools
- name: tui
- name: tua
- name: browser-assistance
- name: voice
- name: runtime
- name: operator-sessions
paths:
  /health:
    get:
      tags:
      - health
      summary: Gateway health snapshot
      security: []
      responses:
        '200':
          description: Gateway health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayHealth'
  /pairing/sessions:
    post:
      tags:
      - pairing
      summary: Create a short-lived pairing session
      description: Started from a trusted local admin context on the Hermes host.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePairingSessionRequest'
      responses:
        '201':
          description: Pairing challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PairingSession'
        '403':
          $ref: '#/components/responses/Forbidden'
  /pairing/start:
    post:
      tags:
      - pairing
      summary: Create a short-lived pairing session
      description: Alias for `/pairing/sessions` used by the first executable slice.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePairingSessionRequest'
      responses:
        '201':
          description: Pairing challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PairingSession'
        '403':
          $ref: '#/components/responses/Forbidden'
  /pairing/sessions/{pairing_id}:
    get:
      tags:
      - pairing
      summary: Read pairing session status
      security: []
      parameters:
      - $ref: '#/components/parameters/PairingId'
      responses:
        '200':
          description: Pairing status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PairingSession'
        '404':
          $ref: '#/components/responses/NotFound'
  /pairing/complete:
    post:
      tags:
      - pairing
      summary: Complete device pairing
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletePairingRequest'
      responses:
        '200':
          description: Device registered and node credentials issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletePairingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/token/refresh:
    post:
      tags:
      - auth
      summary: Refresh a device-bound session token
      security: []
      parameters:
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New session tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenSet'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /devices:
    get:
      tags:
      - devices
      summary: List registered devices
      parameters:
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      responses:
        '200':
          description: Registered devices
          content:
            application/json:
              schema:
                type: object
                required:
                - devices
                properties:
                  devices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Device'
  /devices/{device_id}:
    delete:
      tags:
      - devices
      summary: Revoke a device
      parameters:
      - $ref: '#/components/parameters/DeviceId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      responses:
        '204':
          description: Device revoked
        '404':
          $ref: '#/components/responses/NotFound'
  /devices/{device_id}/rotate-key:
    post:
      tags:
      - devices
      summary: Rotate a device public key
      parameters:
      - $ref: '#/components/parameters/DeviceId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateDeviceKeyRequest'
      responses:
        '200':
          description: Device key rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
  /nodes/register:
    post:
      tags:
      - inventory
      summary: Register or update the local Hermes node
      description: Hermes-local endpoint restricted to loopback callers unless explicitly
        allowlisted.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeRegistration'
      responses:
        '201':
          description: Node registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '403':
          $ref: '#/components/responses/Forbidden'
  /inventory:
    get:
      tags:
      - inventory
      summary: Get node and agent inventory
      parameters:
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      - name: include_stale
        in: query
        schema:
          type: boolean
          default: true
      responses:
        '200':
          description: Inventory snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inventory'
  /nodes/{node_id}:
    get:
      tags:
      - inventory
      summary: Get node detail
      parameters:
      - $ref: '#/components/parameters/NodeId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      responses:
        '200':
          description: Node detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '404':
          $ref: '#/components/responses/NotFound'
  /agents:
    get:
      tags:
      - inventory
      summary: List agents
      parameters:
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      - name: node_id
        in: query
        schema:
          type: string
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/AgentStatus'
      responses:
        '200':
          description: Agents
          content:
            application/json:
              schema:
                type: object
                required:
                - agents
                properties:
                  agents:
                    type: array
                    items:
                      $ref: '#/components/schemas/Agent'
  /agents/{agent_id}:
    get:
      tags:
      - inventory
      summary: Get agent detail
      parameters:
      - $ref: '#/components/parameters/AgentId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      - name: node_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
  /agents/{agent_id}/deployment-trust-context:
    patch:
      tags:
      - inventory
      summary: Update tower-owned deployment trust context for an aircraft
      description: 'Operator-only signed endpoint. The aircraft/backend cannot set
        this value through runtime or loopback request paths.

        '
      parameters:
      - $ref: '#/components/parameters/AgentId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      - name: node_id
        in: query
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentTrustContextRequest'
      responses:
        '200':
          description: Agent trust context updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /teams:
    get:
      tags:
      - teams
      summary: List Teams
      description: Planned mobile grouping endpoint. Teams organize agents without
        replacing node/source identity.
      parameters:
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      responses:
        '200':
          description: Teams
          content:
            application/json:
              schema:
                type: object
                required:
                - teams
                properties:
                  teams:
                    type: array
                    items:
                      $ref: '#/components/schemas/Team'
    post:
      tags:
      - teams
      summary: Create a Team
      description: Planned signed mobile endpoint.
      parameters:
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
      responses:
        '201':
          description: Team created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
  /teams/{team_id}/agents:
    post:
      tags:
      - teams
      summary: Assign an agent to a Team
      description: Planned signed mobile endpoint.
      parameters:
      - $ref: '#/components/parameters/TeamId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamAgentRequest'
      responses:
        '201':
          description: Membership created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTeamMembership'
  /teams/{team_id}/agents/{node_id}/{agent_id}:
    delete:
      tags:
      - teams
      summary: Remove an agent from a Team
      description: Planned signed mobile endpoint.
      parameters:
      - $ref: '#/components/parameters/TeamId'
      - $ref: '#/components/parameters/NodeId'
      - $ref: '#/components/parameters/AgentId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      responses:
        '204':
          description: Membership removed
  /sessions:
    get:
      tags:
      - chat
      summary: List sessions
      parameters:
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      - name: node_id
        in: query
        schema:
          type: string
      - name: agent_id
        in: query
        schema:
          type: string
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/SessionStatus'
      responses:
        '200':
          description: Sessions
          content:
            application/json:
              schema:
                type: object
                required:
                - sessions
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Session'
  /sessions/{session_id}:
    get:
      tags:
      - chat
      summary: Get session detail
      parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      - name: node_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
  /sessions/{session_id}/activity:
    get:
      tags:
      - chat
      summary: Get current activity for a session
      parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      - name: node_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Live activity snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveActivity'
  /conversations/{conversation_id}/messages:
    get:
      tags:
      - chat
      summary: List conversation messages
      parameters:
      - $ref: '#/components/parameters/ConversationId'
      - name: after
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Messages
          content:
            application/json:
              schema:
                type: object
                required:
                - messages
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConversationMessage'
    post:
      tags:
      - chat
      summary: Send a chat message into a conversation
      parameters:
      - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '202':
          description: Message accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationMessage'
  /approvals:
    get:
      tags:
      - approvals
      summary: List approval requests
      parameters:
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      - name: state
        in: query
        schema:
          $ref: '#/components/schemas/ApprovalState'
      - name: node_id
        in: query
        schema:
          type: string
      - name: agent_id
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Approval requests
          content:
            application/json:
              schema:
                type: object
                required:
                - approvals
                properties:
                  approvals:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApprovalRequest'
    post:
      tags:
      - approvals
      summary: Create a pending approval request
      description: Hermes-local endpoint restricted to loopback callers unless explicitly
        allowlisted. Unknown actions default to pending/blocked.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApprovalRequest'
      responses:
        '201':
          description: Approval request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /hermes/tools/approval_requested:
    post:
      tags:
      - hermes-tools
      summary: Hermes tool adapter call to request user approval
      description: Hermes-local tool-shaped endpoint restricted to loopback callers
        unless explicitly allowlisted.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HermesApprovalRequestedRequest'
      responses:
        '201':
          description: Approval request created in pending state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /hermes/tools/approval_status:
    post:
      tags:
      - hermes-tools
      summary: Hermes tool adapter call to poll approval status
      description: Hermes-local endpoint that returns decision state without exposing
        device secrets.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalStatusRequest'
      responses:
        '200':
          description: Current approval state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalStatusResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /approvals/{approval_id}:
    get:
      tags:
      - approvals
      summary: Get approval detail
      parameters:
      - $ref: '#/components/parameters/ApprovalId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      responses:
        '200':
          description: Approval detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
  /approvals/{approval_id}/decisions:
    post:
      tags:
      - approvals
      summary: Submit a signed approval decision
      parameters:
      - $ref: '#/components/parameters/ApprovalId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '200':
          description: Decision accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalDecisionResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /approvals/{approval_id}/approve_once:
    post:
      tags:
      - approvals
      summary: Approve an approval request once
      parameters:
      - $ref: '#/components/parameters/ApprovalId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      responses:
        '200':
          description: Approval approved once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalDecisionResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /approvals/{approval_id}/deny:
    post:
      tags:
      - approvals
      summary: Deny an approval request
      parameters:
      - $ref: '#/components/parameters/ApprovalId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      responses:
        '200':
          description: Approval denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalDecisionResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /local-terminal/approvals/{approval_id}/decisions:
    post:
      tags:
      - approvals
      summary: Submit a local-terminal clearance decision through ACT policy
      description: 'Loopback/local-bound channel for terminal-rendered decisions.
        The terminal is a render surface; ACT still verifies local signature status,
        risk-family channel eligibility, tower-configured deployment trust context,
        and audit requirements before changing approval state.

        '
      parameters:
      - $ref: '#/components/parameters/ApprovalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocalTerminalApprovalDecisionRequest'
      responses:
        '200':
          description: Decision accepted by channel policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalDecisionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /approvals/{approval_id}/expire:
    post:
      tags:
      - approvals
      summary: Expire an approval request
      parameters:
      - $ref: '#/components/parameters/ApprovalId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      responses:
        '200':
          description: Approval expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalDecisionResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /approvals/{approval_id}/cancel:
    post:
      tags:
      - approvals
      summary: Cancel an approval request
      parameters:
      - $ref: '#/components/parameters/ApprovalId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      responses:
        '200':
          description: Approval cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalDecisionResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /approvals/{approval_id}/responses:
    post:
      tags:
      - approvals
      summary: Submit advanced approval response
      description: 'Signed mobile endpoint for advanced responses. `modified` and
        `needs_info` keep the approval pending; `approve_once`, `approve_session`,
        `approve_agent`, and `deny` resolve it. Granting responses must include the
        approval `params_fingerprint`. `propose_policy` creates a proposal only and
        never activates a permanent allow policy.

        '
      parameters:
      - $ref: '#/components/parameters/ApprovalId'
      - $ref: '#/components/parameters/HMCPDeviceIdHeader'
      - $ref: '#/components/parameters/HMCPTimestampHeader'
      - $ref: '#/components/parameters/HMCPNonceHeader'
      - $ref: '#/components/parameters/HMCPSignatureHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalResponseRequest'
      responses:
        '201':
          description: Approval response recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
  /approvals/{approval_id}/policy-proposals:
    get:
