          type: string
        idempotency_key:
          type: string
    ApprovalState:
      enum:
      - pending
      - approved
      - denied
      - expired
      - cancelled
    RiskLevel:
      enum:
      - low
      - medium
      - high
      - critical
    RiskFamily:
      enum:
      - observe
      - read_only
      - routine
      - external_effect
      - destructive
      - credential_or_secret
      - safety_critical
      - irreversible
    ClearanceChannel:
      enum:
      - mobile_signed
      - local_terminal
    DeploymentTrustContext:
      enum:
      - trusted_host
      - untrusted_host
      - adversarial_host
    ApprovalScope:
      enum:
      - once
      - session
      - agent
      - permanent
    ApprovalRequest:
      type: object
      required:
      - approval_id
      - action_id
      - node_id
      - agent_id
      - session_id
      - requested_tool
      - risk_level
      - risk_family
      - params_fingerprint
      - summary
      - full_payload_redacted
      - state
      - expires_at
      - options
      properties:
        approval_id:
          type: string
        action_id:
          type: string
        node_id:
          type: string
        agent_id:
          type: string
        session_id:
          type: string
        requested_tool:
          type: string
        risk_level:
          $ref: '#/components/schemas/RiskLevel'
        risk_category:
          type: string
        risk_family:
          $ref: '#/components/schemas/RiskFamily'
        params_fingerprint:
          type: string
          description: Tower-computed fingerprint over the redacted action payload;
            signed approval decisions must echo it.
        summary:
          type: string
        full_payload_redacted:
          type: object
          additionalProperties: true
        resource_scope:
          type: string
        state:
          $ref: '#/components/schemas/ApprovalState'
        expires_at:
          type: string
          format: date-time
        options:
          type: array
          items:
            enum:
            - approve_once
            - approve_for_session
            - approve_for_agent
            - approve_permanent
            - deny
            - always_deny
            - pause_agent
