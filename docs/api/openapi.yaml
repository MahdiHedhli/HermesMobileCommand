      - mission_id
      - node_id
      - agent_id
      - state
      - created_at
      - updated_at
      properties:
        mission_id:
          type: string
        node_id:
          type: string
        agent_id:
          type: string
        session_id:
          type: string
        state:
          $ref: '#/components/schemas/MissionState'
        title:
          type: string
        summary:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RuntimeContextRequest:
      type: object
      required:
      - agent_id
