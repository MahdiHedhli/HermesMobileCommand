components:
  schemas:
    Agent:
      properties:
        agent_id:
          type: string
          title: Agent Id
        node_id:
          type: string
          title: Node Id
        display_name:
          type: string
          title: Display Name
        agent_kind:
          anyOf:
          - type: string
          - type: 'null'
          title: Agent Kind
        status:
          type: string
          enum:
          - idle
          - running
          - blocked
          - waiting_approval
          - waiting_assistance
          - user_controlling
          - paused
          - stopping
          - offline
          - error
          - failed
          - completed
          - quarantined
          title: Status
        active_session_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Active Session Id
        current_tool:
          anyOf:
          - type: string
          - type: 'null'
          title: Current Tool
        current_target:
          anyOf:
          - type: string
          - type: 'null'
          title: Current Target
        deployment_trust_context:
          type: string
          enum:
          - trusted_host
          - untrusted_host
