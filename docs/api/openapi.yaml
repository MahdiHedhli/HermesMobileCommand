        agent_id:
          type: string
        display_name:
          type: string
        agent_status:
          $ref: '#/components/schemas/AgentStatus'
        mission_id:
          type: string
        mission_state:
          $ref: '#/components/schemas/MissionState'
        session_id:
          type: string
        mission_title:
          type: string
        mission_summary:
          type: string
        current_tool:
          type: string
        current_target:
          type: string
        node_id:
          type: string
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/Capability'
    RuntimeContextResponse:
      type: object
      required:
      - agent
      properties:
        agent:
          $ref: '#/components/schemas/Agent'
        mission:
          $ref: '#/components/schemas/Mission'
        session:
          $ref: '#/components/schemas/Session'
    LiveActivity:
